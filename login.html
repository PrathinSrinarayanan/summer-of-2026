<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fake Stock Simulator</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: var(--text);
    }

    .login-header p {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-alt);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .oauth-btn:hover {
      background: var(--panel);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.15);
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
    }

    .oauth-btn.google:hover {
      border-color: #ea4335;
    }

    .oauth-btn.yahoo:hover {
      border-color: #7c2aef;
    }

    .oauth-btn.microsoft:hover {
      border-color: #00a4ef;
    }

    .login-footer {
      text-align: center;
      margin-top: 32px;
      color: var(--muted);
      font-size: 12px;
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .login-footer a:hover {
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .form-group .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      margin-bottom: 0;
      color: var(--text);
    }
    .form-group .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      transform: translateY(1px);
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-alt);
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--accent);
      color: var(--bg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background: #38bdf8;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
      transform: translateY(-2px);
    }

    .error-message {
      color: var(--danger);
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .form-container {
      display: none;
    }

    .form-container.active {
      display: block;
    }

    .oauth-section {
      display: block;
    }

    .oauth-section.hidden {
      display: none;
    }

    .toggle-auth {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .toggle-auth a {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 id="headerTitle">Welcome Back</h1>
        <p id="headerSubtitle">Sign in to Fake Stock Simulator</p>
      </div>

      <!-- Sign In Form -->
      <form id="signInForm" class="form-container active">
        <div class="form-group">
          <label for="signInEmail">Email</label>
          <input type="email" id="signInEmail" placeholder="your@email.com" required>
          <div class="error-message" id="signInEmailError"></div>
        </div>
        <div class="form-group">
          <label for="signInPassword">Password</label>
          <input type="password" id="signInPassword" placeholder="••••••••" required>
          <div class="error-message" id="signInPasswordError"></div>
        </div>
        <div class="form-group" style="text-align: right; margin-top: -8px; margin-bottom: 8px;">
          <button type="button" id="forgotPasswordBtn" class="secondary" style="width: auto; padding: 6px 10px; font-size: 0.9rem;">Forgot password?</button>
        </div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="rememberMe"> Remember me</label>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <!-- Sign Up Form -->
      <form id="signUpForm" class="form-container">
        <div class="form-group">
          <label for="signUpEmail">Email</label>
          <input type="email" id="signUpEmail" placeholder="your@email.com" required>
          <div class="error-message" id="signUpEmailError"></div>
        </div>
        <div class="form-group">
          <label for="signUpPassword">Password</label>
          <input type="password" id="signUpPassword" placeholder="••••••••" required>
          <div class="error-message" id="signUpPasswordError"></div>
        </div>
        <div class="form-group">
          <label for="signUpConfirm">Confirm Password</label>
          <input type="password" id="signUpConfirm" placeholder="••••••••" required>
          <div class="error-message" id="signUpConfirmError"></div>
        </div>
        <button type="submit" class="submit-btn">Create Account</button>
      </form>

      <!-- OAuth buttons removed — using email/password only -->
      <div style="height:12px"></div>

      <div class="toggle-auth">
        <span id="toggleText">Don't have an account? <a id="toggleLink">Sign up</a></span>
      </div>

      <div class="login-footer">
        <p style="margin-top: 8px;"><a href="index.html">Back to Home</a></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Get elements
      const signInForm = document.getElementById('signInForm');
      const signUpForm = document.getElementById('signUpForm');
      const headerTitle = document.getElementById('headerTitle');
      const headerSubtitle = document.getElementById('headerSubtitle');
      const toggleText = document.getElementById('toggleText');
      const oauthDivider = document.getElementById('oauthDivider'); // may be null

      function attachToggle() {
        const toggleLink = document.getElementById('toggleLink');
        if (!toggleLink) return;
        toggleLink.addEventListener('click', function(e) {
          e.preventDefault();
          const isSignIn = signInForm.classList.contains('active');
          if (isSignIn) {
            // Switch to sign up
            signInForm.classList.remove('active');
            signUpForm.classList.add('active');
            headerTitle.textContent = 'Create Account';
            headerSubtitle.textContent = 'Join Fake Stock Simulator';
            if (oauthDivider) oauthDivider.textContent = 'SIGN UP WITH';
            toggleText.innerHTML = 'Already have an account? <a id="toggleLink" style="cursor: pointer; color: var(--accent); font-weight: 600;">Sign in</a>';
          } else {
            // Switch to sign in
            signInForm.classList.add('active');
            signUpForm.classList.remove('active');
            headerTitle.textContent = 'Welcome Back';
            headerSubtitle.textContent = 'Sign in to Fake Stock Simulator';
            if (oauthDivider) oauthDivider.textContent = 'SIGN IN WITH';
            toggleText.innerHTML = 'Don\'t have an account? <a id="toggleLink" style="cursor: pointer; color: var(--accent); font-weight: 600;">Sign up</a>';
          }
          // Re-attach to the newly created link
          attachToggle();
        });
      }

      attachToggle();

      // Sign in handler
      if (signInForm) {
        signInForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const email = document.getElementById('signInEmail').value.trim();
          const password = document.getElementById('signInPassword').value;
          const remember = document.getElementById('rememberMe').checked;
          document.getElementById('signInEmailError').classList.remove('show');
          document.getElementById('signInPasswordError').classList.remove('show');
          let hasError = false;
          if (!email) {
            document.getElementById('signInEmailError').textContent = 'Email is required';
            document.getElementById('signInEmailError').classList.add('show');
            hasError = true;
          }
          if (!password) {
            document.getElementById('signInPasswordError').textContent = 'Password is required';
            document.getElementById('signInPasswordError').classList.add('show');
            hasError = true;
          }
          if (!hasError) {
            const accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            const account = accounts.find(acc => acc.email === email && acc.password === password);
            if (account) {
              // store login in localStorage if remember checked, otherwise in sessionStorage
              if (remember) {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('loginProvider', 'email');
                localStorage.setItem('userEmail', email);
              } else {
                sessionStorage.setItem('userLoggedIn', 'true');
                sessionStorage.setItem('loginProvider', 'email');
                sessionStorage.setItem('userEmail', email);
              }
              window.location.href = 'index.html';
            } else {
              document.getElementById('signInPasswordError').textContent = 'Invalid email or password';
              document.getElementById('signInPasswordError').classList.add('show');
            }
          }
        });
      }

        // Forgot password handler - opens mailto: to the entered email
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        if (forgotBtn) {
          forgotBtn.addEventListener('click', function() {
            const email = document.getElementById('signInEmail').value.trim();
            if (!email) {
              // If no email entered, show a friendly prompt
              alert('Please enter your email in the Email field so we can send a password reset request.');
              return;
            }
            const subject = encodeURIComponent('Password reset request');
            const body = encodeURIComponent('Hello,%0D%0A%0D%0AI would like to request a password reset for the account associated with this email: ' + email + '%0D%0A%0D%0AThanks.');
            // Open user's mail client with prefilled message without navigating away
            const a = document.createElement('a');
            a.href = `mailto:${email}?subject=${subject}&body=${body}`;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => a.remove(), 1000);
          });
        }

      // Sign up handler
      if (signUpForm) {
        signUpForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const email = document.getElementById('signUpEmail').value.trim();
          const password = document.getElementById('signUpPassword').value;
          const confirmPassword = document.getElementById('signUpConfirm').value;
          document.getElementById('signUpEmailError').classList.remove('show');
          document.getElementById('signUpPasswordError').classList.remove('show');
          document.getElementById('signUpConfirmError').classList.remove('show');
          let hasError = false;
          if (!email) {
            document.getElementById('signUpEmailError').textContent = 'Email is required';
            document.getElementById('signUpEmailError').classList.add('show');
            hasError = true;
          }
          if (!password) {
            document.getElementById('signUpPasswordError').textContent = 'Password is required';
            document.getElementById('signUpPasswordError').classList.add('show');
            hasError = true;
          }
          if (password && password.length < 6) {
            document.getElementById('signUpPasswordError').textContent = 'Password must be at least 6 characters';
            document.getElementById('signUpPasswordError').classList.add('show');
            hasError = true;
          }
          if (password !== confirmPassword) {
            document.getElementById('signUpConfirmError').textContent = 'Passwords do not match';
            document.getElementById('signUpConfirmError').classList.add('show');
            hasError = true;
          }
          if (!hasError) {
            const accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            if (accounts.find(acc => acc.email === email)) {
              document.getElementById('signUpEmailError').textContent = 'This email is already registered';
              document.getElementById('signUpEmailError').classList.add('show');
            } else {
              accounts.push({ email, password });
              localStorage.setItem('accounts', JSON.stringify(accounts));
              // by default sign-up will remember the user (store in localStorage)
              localStorage.setItem('userLoggedIn', 'true');
              localStorage.setItem('loginProvider', 'email');
              localStorage.setItem('userEmail', email);
              window.location.href = 'index.html';
            }
          }
        });
      }

      

      // OAuth handlers: removed simulated click handling so links navigate to providers.
      // To enable real OAuth, replace the placeholder client IDs in the link hrefs
      // with your registered client IDs and redirect URIs. The provider will
      // redirect back to your app's callback URL where you should handle the
      // OAuth code exchange on the server side.
    });
  </script>
</body>
</html>
