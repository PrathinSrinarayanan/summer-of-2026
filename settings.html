<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | Fake Stock Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="marketClock" class="market-clock">
      <span class="market-clock-time">UTC --:--:--</span>
      <div class="market-clock-tooltip">
        <table>
          <tr><th colspan="2">Market Hours</th></tr>
          <tr><td>Opens:</td><td>05:00 UTC</td></tr>
          <tr><td>Closes:</td><td>22:00 UTC</td></tr>
        </table>
      </div>
    </div>
    <header>
      <h1>Settings</h1>
      <p>Reset the simulator and manage your experience.</p>
      <nav class="main-nav">
        <a href="market.html">Market</a>
        <a href="trade.html">Trade</a>
        <a href="create.html">Create Stock</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="settings.html">Settings</a>
        <a href="#" id="logoutBtn" style="color: var(--danger);">Logout</a>
      </nav>
    </header>

    <section class="panel">
      <h2>Simulator Settings</h2>
      <button id="resetButton" class="secondary">Reset Simulator</button>
    </section>

    <section class="panel">
      <h2>Activity Feed</h2>
      <div id="activityFeed" class="feed"></div>
    </section>

    <footer>
      <p>Reset clears simulated cash, portfolio, and created stocks.</p>
    </footer>
  </div>
  <script src="script.js"></script>
  <script>
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.addEventListener('click', function(e){
      e.preventDefault();
      localStorage.removeItem('userLoggedIn');
      localStorage.removeItem('loginProvider');
      localStorage.removeItem('userEmail');
      sessionStorage.removeItem('userLoggedIn');
      sessionStorage.removeItem('loginProvider');
      sessionStorage.removeItem('userEmail');
      window.location.href='login.html';
    });
  </script>
</body>
</html>
